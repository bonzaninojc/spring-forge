<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spring Forge — Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:#f0f4f8;color:#1e293b;}
    .app{display:flex;min-height:100vh;}
    /* ── Sidebar ── */
    .sidebar{width:256px;background:linear-gradient(180deg,#0f2744 0%,#1a3a5c 100%);color:#fff;padding:18px 10px;display:flex;flex-direction:column;position:fixed;height:100vh;overflow-y:auto;z-index:10;}
    .sidebar .logo{display:flex;align-items:center;gap:10px;padding:0 8px;margin-bottom:22px;}
    .sidebar .logo h1{font-size:15px;font-weight:700;}
    .sidebar .logo span{font-size:10px;background:#1976d2;padding:2px 6px;border-radius:4px;}
    .nav-section{font-size:10px;text-transform:uppercase;color:#5b8fb9;letter-spacing:1.2px;padding:0 12px;margin:18px 0 5px;font-weight:600;}
    .nav-item{padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;display:flex;align-items:center;gap:9px;color:#c8ddf0;}
    .nav-item:hover{background:rgba(255,255,255,.07);color:#fff;}
    .nav-item.active{background:#1976d2;color:#fff;box-shadow:0 2px 8px rgba(25,118,210,.4);}
    .nav-item .icon{font-size:14px;width:18px;text-align:center;}
    .nav-item .count{margin-left:auto;font-size:10px;background:rgba(255,255,255,.12);padding:1px 6px;border-radius:10px;}
    .nav-divider{height:1px;background:rgba(255,255,255,.08);margin:10px 8px;}
    .sidebar .actions-bar{margin-top:auto;padding:12px 4px 0;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:5px;}
    .sidebar .actions-bar button{padding:9px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
    .btn-gen{background:#1976d2;color:#fff;}
    .btn-gen:hover{background:#1565c0;}
    .btn-sec{background:rgba(255,255,255,.08);color:#c8ddf0;}
    .btn-sec:hover{background:rgba(255,255,255,.13);}
    /* ── Main ── */
    .main{margin-left:256px;flex:1;padding:26px 30px;min-height:100vh;}
    .page-title{font-size:21px;font-weight:700;margin-bottom:18px;color:#1e293b;display:flex;align-items:center;gap:10px;}
    .card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:14px;border:1px solid #e8edf2;}
    .card h3{font-size:13px;font-weight:600;color:#1976d2;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
    .form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:9px;}
    .form-group{display:flex;flex-direction:column;gap:3px;}
    .form-group label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.3px;}
    .form-group input,.form-group select,.form-group textarea{padding:7px 9px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none;transition:border .15s;font-family:inherit;}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#1976d2;box-shadow:0 0 0 2px rgba(25,118,210,.08);}
    .form-group input[type="checkbox"]{width:15px;height:15px;}
    .checkbox-group{flex-direction:row;align-items:center;gap:6px;}
    .warn{color:#dc2626;font-size:10px;font-weight:500;}
    table{width:100%;border-collapse:collapse;font-size:12px;}
    th{text-align:left;padding:5px 9px;background:#f8fafc;border-bottom:2px solid #e2e8f0;font-weight:600;color:#475569;font-size:11px;text-transform:uppercase;}
    td{padding:5px 9px;border-bottom:1px solid #f1f5f9;}
    tr:hover td{background:#fafcff;}
    .btn-sm{padding:4px 9px;border:none;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;transition:all .1s;}
    .btn-danger{background:#fee2e2;color:#dc2626;}
    .btn-danger:hover{background:#fecaca;}
    .btn-add{background:#dbeafe;color:#1976d2;}
    .btn-add:hover{background:#bfdbfe;}
    .btn-purple{background:#f3e8ff;color:#7c3aed;}
    .btn-purple:hover{background:#ede9fe;}
    /* ── Toast ── */
    .toast{position:fixed;bottom:20px;right:20px;padding:11px 18px;border-radius:8px;color:#fff;font-size:13px;font-weight:500;z-index:1000;animation:slideIn .25s;box-shadow:0 4px 12px rgba(0,0,0,.15);}
    .toast.success{background:#16a34a;}
    .toast.error{background:#dc2626;}
    .toast.info{background:#1976d2;}
    @keyframes slideIn{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
    /* ── Modal ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;}
    .modal{background:#fff;border-radius:12px;padding:22px;min-width:340px;max-width:460px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
    .modal h3{font-size:15px;font-weight:700;margin-bottom:12px;color:#1e293b;}
    .modal .entity-list{max-height:260px;overflow-y:auto;margin-bottom:12px;}
    .modal .entity-item{display:flex;align-items:center;gap:8px;padding:5px 4px;font-size:13px;}
    .modal .modal-actions{display:flex;justify-content:flex-end;gap:8px;}
    .modal .modal-actions button{padding:7px 15px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;}
    /* ── Action card ── */
    .action-card{border:1px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:10px;background:#fafcff;}
    .action-card .action-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .action-card .action-title{font-size:13px;font-weight:600;color:#1e293b;display:flex;align-items:center;gap:7px;}
    .method-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;color:#fff;}
    .method-GET{background:#16a34a;}.method-POST{background:#1976d2;}.method-PUT{background:#d97706;}.method-PATCH{background:#7c3aed;}.method-DELETE{background:#dc2626;}
    .dto-section{margin-top:10px;padding:9px;background:#fff;border:1px solid #e8edf2;border-radius:8px;}
    .dto-section h4{font-size:10px;font-weight:600;color:#64748b;text-transform:uppercase;margin-bottom:7px;}
    .inline-field{display:flex;gap:5px;align-items:center;margin-bottom:3px;}
    .inline-field input,.inline-field select{padding:4px 7px;border:1px solid #e2e8f0;border-radius:4px;font-size:12px;}
    /* ── Diagram Canvas ── */
    .diagram-wrap{background:#fff;border-radius:12px;border:1px solid #e8edf2;overflow:hidden;position:relative;}
    .diagram-toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #f1f5f9;background:#fafcff;}
    .diagram-toolbar button{padding:5px 12px;border:1px solid #e2e8f0;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;background:#fff;transition:all .15s;}
    .diagram-toolbar button:hover{background:#f8fafc;border-color:#1976d2;color:#1976d2;}
    .diagram-toolbar button.active{background:#dbeafe;border-color:#1976d2;color:#1976d2;}
    .diagram-canvas-outer{overflow:auto;height:560px;background:radial-gradient(circle,#e8edf2 1px,transparent 1px) 0 0/22px 22px #f8fafc;}
    .entity-node{position:absolute;background:#fff;border:2px solid #e2e8f0;border-radius:10px;min-width:160px;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:grab;user-select:none;transition:box-shadow .15s;}
    .entity-node:active{cursor:grabbing;}
    .entity-node.selected{border-color:#1976d2;box-shadow:0 0 0 3px rgba(25,118,210,.15),0 4px 12px rgba(0,0,0,.1);}
    .entity-node.rel-source{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.15);}
    .entity-node .node-header{background:linear-gradient(135deg,#1e3a5f,#1976d2);color:#fff;padding:8px 10px;border-radius:8px 8px 0 0;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
    .entity-node .node-header .node-btns{display:flex;gap:4px;opacity:.7;}
    .entity-node .node-header .node-btns button{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:4px;width:20px;height:20px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;}
    .entity-node .node-header .node-btns button:hover{opacity:1;background:rgba(255,255,255,.3);}
    .entity-node .node-fields{padding:6px 0;}
    .entity-node .node-field{padding:3px 10px;font-size:11px;color:#475569;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f8fafc;}
    .entity-node .node-field:last-child{border-bottom:none;}
    .entity-node .node-field .field-type{font-size:10px;color:#94a3b8;font-family:'JetBrains Mono',monospace;}
    .entity-node .node-rel-port{display:flex;align-items:center;justify-content:center;padding:5px 10px;border-top:1px solid #f1f5f9;font-size:10px;color:#94a3b8;cursor:pointer;transition:background .1s;}
    .entity-node .node-rel-port:hover{background:#fafcff;color:#1976d2;}
    /* ── Preview Drawer ── */
    .preview-drawer{position:fixed;right:0;top:0;height:100vh;background:#1e2433;color:#e2e8f0;width:600px;z-index:200;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.3);transform:translateX(100%);transition:transform .3s;}
    .preview-drawer.open{transform:translateX(0);}
    .preview-header{padding:14px 18px;background:#161b27;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.07);}
    .preview-header h3{font-size:14px;font-weight:600;flex:1;}
    .preview-header button{background:rgba(255,255,255,.08);border:none;color:#94a3b8;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:12px;}
    .preview-header button:hover{background:rgba(255,255,255,.14);color:#fff;}
    .preview-tabs{display:flex;background:#161b27;border-bottom:1px solid rgba(255,255,255,.07);}
    .preview-tab{padding:8px 14px;font-size:11px;font-weight:600;color:#64748b;cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;}
    .preview-tab:hover{color:#94a3b8;}
    .preview-tab.active{color:#60a5fa;border-bottom-color:#60a5fa;}
    .preview-layer-bar{display:flex;gap:4px;padding:8px 14px;background:#1a2030;border-bottom:1px solid rgba(255,255,255,.05);flex-wrap:wrap;}
    .preview-layer-btn{padding:3px 9px;border:1px solid rgba(255,255,255,.1);border-radius:12px;font-size:11px;cursor:pointer;color:#94a3b8;background:transparent;transition:all .15s;}
    .preview-layer-btn:hover{border-color:#60a5fa;color:#60a5fa;}
    .preview-layer-btn.active{background:#1d4ed8;border-color:#1d4ed8;color:#fff;}
    .preview-body{flex:1;overflow:auto;}
    .preview-code{padding:16px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;white-space:pre;color:#e2e8f0;}
    .preview-loading{display:flex;align-items:center;justify-content:center;height:200px;color:#64748b;font-size:13px;gap:10px;}
    .preview-file-list{border-right:1px solid rgba(255,255,255,.06);min-width:180px;background:#161b27;}
    .preview-file-item{padding:8px 14px;font-size:11px;font-family:'JetBrains Mono',monospace;color:#64748b;cursor:pointer;transition:background .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .preview-file-item:hover{background:rgba(255,255,255,.04);color:#94a3b8;}
    .preview-file-item.active{background:rgba(96,165,250,.12);color:#60a5fa;}
    .preview-split{display:flex;flex:1;overflow:hidden;}
    /* ── Syntax highlight ── */
    .kw{color:#c792ea;}.ty{color:#82aaff;}.st{color:#c3e88d;}.cm{color:#546e7a;font-style:italic;}.an{color:#ffcb6b;}.nu{color:#f78c6c;}
    /* ── Relation drawing mode ── */
    .rel-draw-hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:#7c3aed;color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;pointer-events:none;z-index:5;box-shadow:0 2px 8px rgba(124,58,237,.4);}
    /* ── Relation type picker ── */
    .rel-picker{position:fixed;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:300;min-width:200px;}
    .rel-picker h4{font-size:12px;font-weight:600;color:#1e293b;margin-bottom:8px;}
    .rel-picker .rel-option{padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:#374151;transition:background .1s;display:flex;align-items:center;gap:7px;}
    .rel-picker .rel-option:hover{background:#f0f4f8;}
    .rel-picker .rel-option .rel-badge{font-size:10px;font-family:'JetBrains Mono',monospace;background:#f1f5f9;padding:2px 5px;border-radius:3px;color:#1976d2;}
    /* ── Diagram relation legend ── */
    .rel-tag{font-size:9px;background:#e0e7ff;color:#3730a3;padding:2px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;}
    /* ── Empty state ── */
    .empty-state{text-align:center;padding:48px 20px;color:#94a3b8;}
    .empty-state h3{font-size:18px;margin-bottom:6px;color:#64748b;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef, useCallback, useMemo } = React;

  // ── Heartbeat ──
  setInterval(() => fetch('/api/heartbeat').catch(()=>{}), 5000);

  // ── API ──
  const api = {
    async getForge() { const r=await fetch('/api/forge'); if(!r.ok) throw new Error(); return r.json(); },
    async saveForge(d) { return (await fetch('/api/forge',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)})).json(); },
    async validate(d) { return (await fetch('/api/validate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)})).json(); },
    async generate(entities) { return (await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(entities?{entities}:{})})).json(); },
    async reverse(params) { return (await fetch('/api/reverse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(params)})).json(); },
    async preview(entity,layer) { return (await fetch('/api/preview',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({entity,layer})})).json(); },
  };

  // ── Simple Java syntax highlighter ──
  function highlight(code) {
    const keywords = /\b(package|import|public|private|protected|class|interface|extends|implements|new|return|if|else|for|while|void|static|final|boolean|int|long|double|float|null|true|false|this|super|try|catch|throw|throws)\b/g;
    const types    = /\b(String|List|Set|Map|Long|Integer|Boolean|Double|UUID|LocalDate|LocalDateTime|BigDecimal|Optional|Page|Pageable|ResponseEntity|HttpStatus|Override|Entity|Table|Column|Id|ManyToOne|OneToMany|OneToOne|ManyToMany|JoinColumn|Transactional|Service|Repository|RestController|RequestMapping|GetMapping|PostMapping|PutMapping|DeleteMapping|PatchMapping|PathVariable|RequestBody|RequestParam|Valid|NotNull|NotBlank|Size|Enumerated|EnumType|GeneratedValue|GenerationType)\b/g;
    const strings  = /(["'])((?:\\.|(?!\1)[^\\])*)\1/g;
    const comments = /(\/\/[^\n]*|\/\*[\s\S]*?\*\/)/g;
    const annots   = /(@\w+)/g;
    const numbers  = /\b(\d+L?)\b/g;

    return code
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(comments,  m=>`<span class="cm">${m}</span>`)
            .replace(strings,   m=>`<span class="st">${m}</span>`)
            .replace(annots,    m=>`<span class="an">${m}</span>`)
            .replace(keywords,  m=>`<span class="kw">${m}</span>`)
            .replace(types,     m=>`<span class="ty">${m}</span>`)
            .replace(numbers,   m=>`<span class="nu">${m}</span>`);
  }

  // ════════════════════════════════════════
  // Toast
  // ════════════════════════════════════════
  function Toast({message,type,onClose}) {
    useEffect(()=>{const t=setTimeout(onClose,3500);return()=>clearTimeout(t);},[]);
    return <div className={`toast ${type}`}>{message}</div>;
  }

  // ════════════════════════════════════════
  // Code Preview Drawer
  // ════════════════════════════════════════
  const LAYERS = [
    {id:'entity',     label:'Entity'},
    {id:'controller', label:'Controller'},
    {id:'service',    label:'Service'},
    {id:'repository', label:'Repository'},
    {id:'dto',        label:'DTO'},
    {id:'mapper',     label:'Mapper'},
  ];

  function PreviewDrawer({open, entityName, onClose}) {
    const [layer, setLayer] = useState('entity');
    const [loading, setLoading] = useState(false);
    const [files, setFiles] = useState({});
    const [activeFile, setActiveFile] = useState(null);
    const [error, setError] = useState(null);

    const load = useCallback(async (ent, lyr) => {
      if (!ent) return;
      setLoading(true); setError(null); setFiles({}); setActiveFile(null);
      try {
        const r = await api.preview(ent, lyr);
        if (r.error) { setError(r.error); }
        else {
          setFiles(r.files || {});
          const first = Object.keys(r.files||{})[0];
          setActiveFile(first || null);
        }
      } catch(e) { setError('Erro ao gerar preview'); }
      setLoading(false);
    }, []);

    useEffect(() => {
      if (open && entityName) load(entityName, layer);
    }, [open, entityName, layer]);

    const fileNames = Object.keys(files);
    const code = activeFile ? files[activeFile] : '';

    return (
            <div className={`preview-drawer ${open?'open':''}`}>
              <div className="preview-header">
                <span style={{fontSize:16}}>🔍</span>
                <h3>Preview — {entityName || '…'}</h3>
                <button onClick={onClose}>✕ Fechar</button>
              </div>
              <div className="preview-layer-bar">
                {LAYERS.map(l=>(
                        <button key={l.id} className={`preview-layer-btn ${layer===l.id?'active':''}`}
                                onClick={()=>setLayer(l.id)}>{l.label}</button>
                ))}
              </div>
              <div className="preview-split">
                {fileNames.length>1 && (
                        <div className="preview-file-list">
                          {fileNames.map(f=>(
                                  <div key={f} className={`preview-file-item ${activeFile===f?'active':''}`}
                                       onClick={()=>setActiveFile(f)} title={f}>
                                    📄 {f.split('/').pop()}
                                  </div>
                          ))}
                        </div>
                )}
                <div className="preview-body" style={{flex:1}}>
                  {loading && <div className="preview-loading">⏳ Gerando preview…</div>}
                  {error   && <div className="preview-loading" style={{color:'#f87171'}}>⚠ {error}</div>}
                  {!loading && !error && code &&
                          <div className="preview-code"
                               dangerouslySetInnerHTML={{__html: highlight(code)}}/>}
                  {!loading && !error && !code && !Object.keys(files).length && entityName &&
                          <div className="preview-loading" style={{flexDirection:'column',gap:6}}>
                            <span style={{fontSize:24}}>📂</span>
                            <span>Nenhum arquivo gerado para esta camada</span>
                          </div>}
                </div>
              </div>
            </div>
    );
  }

  // ════════════════════════════════════════
  // Relation Picker popup
  // ════════════════════════════════════════
  function RelPicker({pos, from, to, onConfirm, onCancel}) {
    const REL_TYPES = [
      {type:'ManyToOne',  label:'ManyToOne',  desc:`Muitos ${from} → um ${to}`},
      {type:'OneToMany',  label:'OneToMany',  desc:`Um ${from} → muitos ${to}`},
      {type:'OneToOne',   label:'OneToOne',   desc:`Um para um`},
      {type:'ManyToMany', label:'ManyToMany', desc:`Muitos para muitos`},
    ];
    return (
            <div className="rel-picker" style={{top:pos.y, left:pos.x}} onClick={e=>e.stopPropagation()}>
              <h4>🔗 {from} → {to}</h4>
              {REL_TYPES.map(r=>(
                      <div key={r.type} className="rel-option" onClick={()=>onConfirm(r.type)}>
                        <span className="rel-badge">{r.type}</span>
                        <span style={{fontSize:11,color:'#64748b'}}>{r.desc}</span>
                      </div>
              ))}
              <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid #f1f5f9'}}>
                <button className="btn-sm" onClick={onCancel} style={{background:'#f1f5f9',color:'#64748b',width:'100%'}}>Cancelar</button>
              </div>
            </div>
    );
  }

  // ════════════════════════════════════════
  // Diagram — Visual Relationship Editor
  // ════════════════════════════════════════
  const REL_COLORS = {ManyToOne:'#1976d2',OneToMany:'#16a34a',OneToOne:'#d97706',ManyToMany:'#7c3aed'};
  const REL_DASH   = {ManyToOne:'none',OneToMany:'6,3',OneToOne:'none',ManyToMany:'8,4'};
  const REL_ARROW  = {ManyToOne:'url(#arr-blue)',OneToMany:'url(#arr-green)',OneToOne:'url(#arr-orange)',ManyToMany:'url(#arr-purple)'};

  function DiagramPage({forge, onChange, showPreview}) {
    const canvasRef    = useRef(null);
    const svgRef       = useRef(null);
    const nodeRefs     = useRef({});        // name → DOM element
    const lineRefs     = useRef({});        // lineId → {line,rect,text} DOM elements
    const dragging     = useRef(null);      // {name, ox, oy}
    const posRef       = useRef({});        // live positions (never triggers re-render during drag)

    const NODE_W = 168;
    const nodeHeight = (e) => 44 + Math.min((e.fields||[]).length, 5) * 22 + 28;

    const entities = forge?.entities || [];

    // ── positions state: only drives initial render and forced re-layout ──
    const [positions, setPositions] = useState(() => {
      const pos = {};
      entities.forEach((e,i) => { pos[e.name] = {x: 60+(i%4)*200, y: 60+Math.floor(i/4)*220}; });
      return pos;
    });

    // Keep posRef in sync with state (and vice-versa for new entities)
    useEffect(() => {
      setPositions(prev => {
        const next = {...prev};
        entities.forEach((e,i) => {
          if (!next[e.name]) next[e.name] = {x:60+(i%4)*210, y:60+Math.floor(i/4)*230};
        });
        posRef.current = next;
        return next;
      });
    }, [entities.length]);

    // Sync posRef when positions state changes (e.g. autoLayout)
    useEffect(() => { posRef.current = positions; }, [positions]);

    const [drawMode,  setDrawMode]  = useState(false);
    const [relSource, setRelSource] = useState(null);
    const [picker,    setPicker]    = useState(null);
    const [selected,  setSelected]  = useState(null);

    // ── Compute SVG lines purely from posRef (no state dependency) ──
    const redrawLines = useCallback(() => {
      const pos = posRef.current;
      entities.forEach(e => {
        (e.relations||[]).forEach((r, ri) => {
          const id  = `${e.name}-${r.targetEntity}-${ri}`;
          const src = pos[e.name];
          const tgt = pos[r.targetEntity];
          const refs = lineRefs.current[id];
          if (!src || !tgt || !refs) return;
          const nh = nodeHeight(e);
          const x1 = src.x + NODE_W/2, y1 = src.y + nh/2;
          const x2 = tgt.x + NODE_W/2, y2 = tgt.y + nodeHeight(entities.find(ee=>ee.name===r.targetEntity)||e)/2;
          const mx = (x1+x2)/2, my = (y1+y2)/2;
          if (refs.line) { refs.line.setAttribute('x1',x1); refs.line.setAttribute('y1',y1); refs.line.setAttribute('x2',x2); refs.line.setAttribute('y2',y2); }
          if (refs.rect) { refs.rect.setAttribute('x',mx-28); refs.rect.setAttribute('y',my-9); }
          if (refs.text) { refs.text.setAttribute('x',mx); refs.text.setAttribute('y',my+3); }
        });
      });
    }, [entities]);

    // Re-draw lines whenever entities or positions state changes
    useEffect(() => { redrawLines(); });

    // ── Drag: move DOM nodes directly, no setState during drag ──
    const onMouseDown = (e, name) => {
      if (drawMode) return;
      e.preventDefault(); e.stopPropagation();
      const outer = canvasRef.current;
      const pos   = posRef.current[name] || {x:0,y:0};
      const ox = e.clientX - outer.getBoundingClientRect().left + outer.scrollLeft - pos.x;
      const oy = e.clientY - outer.getBoundingClientRect().top  + outer.scrollTop  - pos.y;
      dragging.current = {name, ox, oy};
      setSelected(name);
    };

    // Attach global mousemove/mouseup on mount so drag works outside canvas
    useEffect(() => {
      const onMove = (e) => {
        if (!dragging.current) return;
        const {name, ox, oy} = dragging.current;
        const outer = canvasRef.current;
        if (!outer) return;
        const rect = outer.getBoundingClientRect();
        const x = Math.max(0, e.clientX - rect.left + outer.scrollLeft - ox);
        const y = Math.max(0, e.clientY - rect.top  + outer.scrollTop  - oy);
        posRef.current = {...posRef.current, [name]: {x,y}};
        // Move node DOM directly
        const el = nodeRefs.current[name];
        if (el) { el.style.left = x+'px'; el.style.top = y+'px'; }
        // Redraw SVG lines directly
        redrawLines();
      };
      const onUp = () => {
        if (!dragging.current) return;
        // Commit to React state once on mouseup
        setPositions({...posRef.current});
        dragging.current = null;
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup',   onUp);
      return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
    }, [redrawLines]);

    // ── Relation draw mode ──
    const onNodeRelPort = (e, entityName) => {
      e.stopPropagation();
      if (!drawMode) return;
      if (!relSource) { setRelSource(entityName); }
      else if (relSource !== entityName) { setPicker({pos:{x:e.clientX-200, y:e.clientY-60}, from:relSource, to:entityName}); }
      else { setRelSource(null); }
    };

    const confirmRelation = (relType) => {
      if (!picker) return;
      const {from, to} = picker;
      const fieldName = to.charAt(0).toLowerCase()+to.slice(1);
      const idx = entities.findIndex(e=>e.name===from);
      if (idx<0) return;
      const updated = [...entities];
      const ent = {...updated[idx]};
      ent.relations = [...(ent.relations||[]), {type:relType, targetEntity:to, fieldName, fetch:'LAZY', cascade:'MERGE,PERSIST', inResponse:true}];
      updated[idx] = ent;
      onChange({...forge, entities:updated});
      setPicker(null); setRelSource(null); setDrawMode(false);
    };

    const cancelPicker = () => { setPicker(null); setRelSource(null); };

    const autoLayout = () => {
      const cols = Math.ceil(Math.sqrt(entities.length));
      const pos  = {};
      entities.forEach((e,i) => { pos[e.name] = {x:40+(i%cols)*210, y:40+Math.floor(i/cols)*230}; });
      posRef.current = pos;
      setPositions(pos);
    };

    // Build all relation line descriptors for initial render
    const allLines = useMemo(() => {
      const lines = [];
      entities.forEach(e => {
        (e.relations||[]).forEach((r,ri) => {
          const pos = posRef.current;
          const src = pos[e.name] || {x:0,y:0};
          const tgt = pos[r.targetEntity] || {x:0,y:0};
          const nh  = nodeHeight(e);
          const x1=src.x+NODE_W/2, y1=src.y+nh/2, x2=tgt.x+NODE_W/2, y2=tgt.y+nh/2;
          const mx=(x1+x2)/2, my=(y1+y2)/2;
          lines.push({id:`${e.name}-${r.targetEntity}-${ri}`,x1,y1,x2,y2,mx,my,type:r.type||'ManyToOne'});
        });
      });
      return lines;
    }, [entities]);

    return (
            <div>
              <div className="page-title">🗺️ Editor Visual de Relacionamentos</div>
              <div className="diagram-wrap">
                <div className="diagram-toolbar">
                  <button className={drawMode?'active':''} onClick={()=>{setDrawMode(d=>!d);setRelSource(null);}}>
                    {drawMode ? '✏️ Modo: Conectar (clique para cancelar)' : '🔗 Modo: Mover'}
                  </button>
                  <button onClick={autoLayout}>⊞ Auto Layout</button>
                  <span style={{fontSize:11,color:'#94a3b8',marginLeft:8}}>
            {drawMode
                    ? (relSource ? `Clique em ⊕ na entidade de destino` : 'Clique em ⊕ na entidade de origem')
                    : 'Arraste entidades · Ative "Conectar" para criar relacionamentos'}
          </span>
                </div>
                <div className="diagram-canvas-outer" ref={canvasRef}
                     onClick={()=>{if(picker)cancelPicker();}}>

                  {drawMode && relSource && <div className="rel-draw-hint">Conectando de: {relSource}</div>}

                  {/* SVG overlay — lines manipulated directly via lineRefs */}
                  <svg ref={svgRef} style={{position:'absolute',inset:0,pointerEvents:'none',width:'100%',height:'100%',overflow:'visible',zIndex:1}}>
                    <defs>
                      {[{id:'blue',c:'#1976d2'},{id:'green',c:'#16a34a'},{id:'orange',c:'#d97706'},{id:'purple',c:'#7c3aed'}].map(m=>(
                              <marker key={m.id} id={`arr-${m.id}`} markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
                                <path d="M0,0 L0,6 L8,3 z" fill={m.c}/>
                              </marker>
                      ))}
                    </defs>
                    {allLines.map(l=>{
                      const color = REL_COLORS[l.type]||'#94a3b8';
                      const dash  = REL_DASH[l.type]||'none';
                      const arrow = REL_ARROW[l.type]||'url(#arr-blue)';
                      return (
                              <g key={l.id}>
                                <line ref={el=>{ if(!lineRefs.current[l.id])lineRefs.current[l.id]={}; lineRefs.current[l.id].line=el; }}
                                      x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2}
                                      stroke={color} strokeWidth="2" strokeDasharray={dash} markerEnd={arrow} opacity="0.8"/>
                                <rect ref={el=>{ if(!lineRefs.current[l.id])lineRefs.current[l.id]={}; lineRefs.current[l.id].rect=el; }}
                                      x={l.mx-28} y={l.my-9} width={56} height={16} rx={4} fill="white" opacity="0.9"/>
                                <text ref={el=>{ if(!lineRefs.current[l.id])lineRefs.current[l.id]={}; lineRefs.current[l.id].text=el; }}
                                      x={l.mx} y={l.my+3} textAnchor="middle" fontSize="9"
                                      fill={color} fontFamily="JetBrains Mono, monospace" fontWeight="600">{l.type}</text>
                              </g>
                      );
                    })}
                  </svg>

                  {/* Entity nodes — position driven by posRef, moved via DOM ref during drag */}
                  <div style={{position:'relative',width:'100%',height:'100%'}}>
                    {entities.map((e,idx)=>{
                      const pos = positions[e.name] || {x:60+idx*200, y:60};
                      const isSelected = selected===e.name;
                      const isSource   = relSource===e.name;
                      return (
                              <div key={e.name}
                                   ref={el=>{ nodeRefs.current[e.name]=el; }}
                                   className={`entity-node ${isSelected?'selected':''} ${isSource?'rel-source':''}`}
                                   style={{left:pos.x, top:pos.y, width:NODE_W, position:'absolute', zIndex:isSelected?3:2}}
                                   onMouseDown={ev=>onMouseDown(ev, e.name)}>
                                <div className="node-header">
                                  <span>{e.name}</span>
                                  <div className="node-btns">
                                    <button title="Preview" onClick={ev=>{ev.stopPropagation();showPreview(e.name);}}>🔍</button>
                                  </div>
                                </div>
                                <div className="node-fields">
                                  <div className="node-field" style={{color:'#94a3b8',fontSize:10}}>
                                    <span>id</span><span className="field-type">Long</span>
                                  </div>
                                  {(e.fields||[]).slice(0,5).map(f=>(
                                          <div key={f.name||f.type} className="node-field">
                                            <span>{f.name}</span>
                                            <span className="field-type">{f.type}</span>
                                          </div>
                                  ))}
                                  {(e.fields||[]).length>5 && (
                                          <div className="node-field" style={{color:'#94a3b8',fontSize:10,justifyContent:'center'}}>
                                            +{(e.fields||[]).length-5} mais…
                                          </div>
                                  )}
                                  {(e.relations||[]).length>0 && (
                                          <div style={{padding:'3px 10px',fontSize:10,color:'#7c3aed',borderTop:'1px solid #f1f5f9',lineHeight:1.4}}>
                                            🔗 {(e.relations||[]).map(r=>`${r.type}→${r.targetEntity}`).join(', ')}
                                          </div>
                                  )}
                                </div>
                                <div className="node-rel-port" onClick={ev=>onNodeRelPort(ev,e.name)}>
                                  ⊕ conectar
                                </div>
                              </div>
                      );
                    })}
                  </div>
                </div>
              </div>

              {/* Legend */}
              <div className="card" style={{marginTop:14}}>
                <h3>📘 Legenda</h3>
                <div style={{display:'flex',gap:20,flexWrap:'wrap',fontSize:12}}>
                  {Object.entries(REL_COLORS).map(([type,color])=>(
                          <div key={type} style={{display:'flex',alignItems:'center',gap:6}}>
                            <svg width="40" height="10"><line x1="0" y1="5" x2="40" y2="5" stroke={color} strokeWidth="2" strokeDasharray={REL_DASH[type]}/></svg>
                            <span style={{color:'#475569'}}>{type}</span>
                          </div>
                  ))}
                </div>
              </div>

              {picker && (
                      <RelPicker pos={picker.pos} from={picker.from} to={picker.to}
                                 onConfirm={confirmRelation} onCancel={cancelPicker}/>
              )}
            </div>
    );
  }

  // ════════════════════════════════════════
  // Project Page
  // ════════════════════════════════════════
  function ProjectPage({project,onChange}) {
    const set=(k,v)=>onChange({...project,[k]:v});
    const flags=['generateMigrations','generateMappers','generateFrontend','generateRabbitMQ','generateOpenApi','generateSpringEvents','generateScheduled','generateTests','generateSecurity','generateCache'];
    const labels={generateMigrations:'Migrations',generateMappers:'Mappers',generateFrontend:'Frontend React',generateRabbitMQ:'RabbitMQ',generateOpenApi:'OpenAPI',generateSpringEvents:'Spring Events',generateScheduled:'Scheduled',generateTests:'Testes',generateSecurity:'Security/RBAC',generateCache:'Cache'};
    return (<div>
      <div className="page-title">⚙️ Configuração do Projeto</div>
      <div className="card">
        <h3>📦 Informações Gerais</h3>
        <div className="form-grid">
          <div className="form-group"><label>Nome</label><input value={project.name||''} onChange={e=>set('name',e.target.value)}/></div>
          <div className="form-group"><label>Pacote Base</label><input value={project.basePackage||''} onChange={e=>set('basePackage',e.target.value)} placeholder="com.myapp"/>
            {project.basePackage&&!/^[a-z][a-z0-9]*(\.[a-z][a-z0-9]*)*$/.test(project.basePackage)&&<span className="warn">⚠ Pacote inválido</span>}
          </div>
          <div className="form-group"><label>Banco de Dados</label><select value={project.database||'postgres'} onChange={e=>set('database',e.target.value)}><option value="postgres">PostgreSQL</option><option value="mysql">MySQL</option><option value="h2">H2</option><option value="mongodb">MongoDB</option></select></div>
        </div>
      </div>
      <div className="card">
        <h3>🔧 Features</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(170px,1fr))',gap:6}}>
          {flags.map(f=>(<div key={f} className="form-group checkbox-group">
            <input type="checkbox" checked={project[f]||false} onChange={e=>set(f,e.target.checked)} id={f}/>
            <label htmlFor={f} style={{cursor:'pointer',fontSize:12}}>{labels[f]}</label>
          </div>))}
        </div>
      </div>
    </div>);
  }

  // ════════════════════════════════════════
  // Entity Page (Fields + Relations)
  // ════════════════════════════════════════
  function EntityPage({entity,allNames,onChange,showPreview}) {
    const set=(k,v)=>onChange({...entity,[k]:v});
    const types=['String','Integer','Long','Double','Float','BigDecimal','Boolean','LocalDate','LocalDateTime','UUID','Enum'];
    const fields=entity.fields||[]; const relations=entity.relations||[]; const filters=entity.filters||[];
    const operators=['EQUALS','NOT_EQUALS','CONTAINS','STARTS_WITH','ENDS_WITH','GREATER_THAN','GREATER_THAN_OR_EQUAL','LESS_THAN','LESS_THAN_OR_EQUAL','IN','BETWEEN','IS_NULL','IS_NOT_NULL'];

    const addField=()=>set('fields',[...fields,{name:'',type:'String',required:false}]);
    const updField=(i,k,v)=>{const u=[...fields];u[i]={...u[i],[k]:v};set('fields',u);};
    const delField=(i)=>set('fields',fields.filter((_,idx)=>idx!==i));

    const addRel=()=>set('relations',[...relations,{type:'ManyToOne',targetEntity:'',fieldName:'',fetch:'LAZY',cascade:'MERGE,PERSIST',inResponse:true}]);
    const updRel=(i,k,v)=>{const u=[...relations];u[i]={...u[i],[k]:v};set('relations',u);};
    const delRel=(i)=>set('relations',relations.filter((_,idx)=>idx!==i));

    const addFilter=()=>set('filters',[...filters,{name:'',type:'String',label:''}]);
    const updFilter=(i,k,v)=>{const u=[...filters];u[i]={...u[i],[k]:v};set('filters',u);};
    const delFilter=(i)=>set('filters',filters.filter((_,idx)=>idx!==i));

    const ei=entity.exportImport||{}; const setEi=(k,v)=>set('exportImport',{...ei,[k]:v});

    return (<div>
      <div className="page-title" style={{justifyContent:'space-between'}}>
        <span>🏗️ {entity.name||'Nova Entidade'}</span>
        <button className="btn-sm btn-purple" onClick={()=>showPreview(entity.name)} style={{padding:'6px 14px',fontSize:12}}>🔍 Preview Código</button>
      </div>

      <div className="card">
        <h3>🏗️ Configuração</h3>
        <div className="form-grid">
          <div className="form-group"><label>Nome</label><input value={entity.name||''} onChange={e=>set('name',e.target.value)} placeholder="Product"/>
            {entity.name&&!/^[A-Z][a-zA-Z0-9]*$/.test(entity.name)&&<span className="warn">⚠ PascalCase</span>}
          </div>
          <div className="form-group"><label>Tabela</label><input value={entity.tableName||''} onChange={e=>set('tableName',e.target.value)} placeholder="(auto)"/></div>
          <div className="form-group"><label>API Path</label><input value={entity.apiPath||''} onChange={e=>set('apiPath',e.target.value)} placeholder="/api/v1/products"/>
            {entity.apiPath&&!entity.apiPath.startsWith('/')&&<span className="warn">⚠ Deve iniciar com /</span>}
          </div>
          <div className="form-group"><label>Roles</label><input value={(entity.roles||[]).join(', ')} onChange={e=>set('roles',e.target.value.split(',').map(s=>s.trim()).filter(Boolean))} placeholder="ADMIN, USER"/></div>
          <div className="form-group checkbox-group"><input type="checkbox" checked={entity.auditable!==false} onChange={e=>set('auditable',e.target.checked)} id="aud"/><label htmlFor="aud">Auditoria</label></div>
          <div className="form-group checkbox-group"><input type="checkbox" checked={entity.softDelete||false} onChange={e=>set('softDelete',e.target.checked)} id="sd"/><label htmlFor="sd">Soft Delete</label></div>
        </div>
      </div>

      <div className="card">
        <h3>📋 Campos ({fields.length})</h3>
        {fields.length>0&&<table><thead><tr><th>Nome</th><th>Tipo</th><th>Req</th><th>Unique</th><th>Max</th><th>Enum Values</th><th></th></tr></thead><tbody>
        {fields.map((f,i)=>(<tr key={i}>
          <td><input value={f.name||''} onChange={e=>updField(i,'name',e.target.value)} style={{border:'none',fontSize:12,width:110}} placeholder="campo"/>
            {f.name&&!/^[a-z][a-zA-Z0-9]*$/.test(f.name)&&<span className="warn"> ⚠</span>}</td>
          <td><select value={f.type||'String'} onChange={e=>updField(i,'type',e.target.value)} style={{border:'none',fontSize:12}}>{types.map(t=><option key={t}>{t}</option>)}</select></td>
          <td><input type="checkbox" checked={f.required||false} onChange={e=>updField(i,'required',e.target.checked)}/></td>
          <td><input type="checkbox" checked={f.unique||false} onChange={e=>updField(i,'unique',e.target.checked)}/></td>
          <td><input type="number" value={f.maxLength||''} onChange={e=>updField(i,'maxLength',e.target.value?+e.target.value:null)} style={{width:48,border:'none',fontSize:12}}/></td>
          <td>{f.type==='Enum'&&<input value={(f.enumValues||[]).join(',')} onChange={e=>updField(i,'enumValues',e.target.value.split(',').map(s=>s.trim()).filter(Boolean))} style={{fontSize:11,border:'1px solid #e2e8f0',borderRadius:4,padding:'2px 4px',width:110}} placeholder="VAL1,VAL2"/>}
            {f.type==='Enum'&&(!f.enumValues||!f.enumValues.length)&&<span className="warn"> ⚠</span>}</td>
          <td><button className="btn-sm btn-danger" onClick={()=>delField(i)}>✕</button></td>
        </tr>))}
        </tbody></table>}
        <button className="btn-sm btn-add" onClick={addField} style={{marginTop:10}}>+ Campo</button>
      </div>

      <div className="card">
        <h3>🔗 Relacionamentos ({relations.length})</h3>
        {relations.length>0&&<table><thead><tr><th>Tipo</th><th>Entidade Alvo</th><th>Campo</th><th>Fetch</th><th>mappedBy</th><th>inResponse</th><th></th></tr></thead><tbody>
        {relations.map((r,i)=>(<tr key={i}>
          <td><select value={r.type||'ManyToOne'} onChange={e=>updRel(i,'type',e.target.value)} style={{border:'none',fontSize:12}}>
            {['ManyToOne','OneToMany','OneToOne','ManyToMany'].map(t=><option key={t}>{t}</option>)}</select></td>
          <td><select value={r.targetEntity||''} onChange={e=>updRel(i,'targetEntity',e.target.value)} style={{border:'none',fontSize:12}}>
            <option value="">Selecione</option>{allNames.filter(n=>n!==entity.name).map(n=><option key={n}>{n}</option>)}</select></td>
          <td><input value={r.fieldName||''} onChange={e=>updRel(i,'fieldName',e.target.value)} style={{border:'none',fontSize:12,width:90}} placeholder="campo"/></td>
          <td><select value={r.fetch||'LAZY'} onChange={e=>updRel(i,'fetch',e.target.value)} style={{border:'none',fontSize:12}}><option>LAZY</option><option>EAGER</option></select></td>
          <td><input value={r.mappedBy||''} onChange={e=>updRel(i,'mappedBy',e.target.value||undefined)} style={{border:'none',fontSize:12,width:80}} placeholder="(opcional)"/></td>
          <td><input type="checkbox" checked={r.inResponse!==false} onChange={e=>updRel(i,'inResponse',e.target.checked)}/></td>
          <td><button className="btn-sm btn-danger" onClick={()=>delRel(i)}>✕</button></td>
        </tr>))}
        </tbody></table>}
        <button className="btn-sm btn-add" onClick={addRel} style={{marginTop:10}}>+ Relacionamento</button>
      </div>

      <div className="card">
        <h3>🔍 Filtros ({filters.length})</h3>
        {filters.length>0&&<table><thead><tr><th>Nome</th><th>Tipo</th><th>Label</th><th>Operador</th><th>Target Field</th><th>Enum Values</th><th></th></tr></thead><tbody>
        {filters.map((f,i)=>(<tr key={i}>
          <td><input value={f.name||''} onChange={e=>updFilter(i,'name',e.target.value)} style={{border:'none',fontSize:12,width:90}} placeholder="campo"/></td>
          <td><select value={f.type||'String'} onChange={e=>updFilter(i,'type',e.target.value)} style={{border:'none',fontSize:12}}>{types.map(t=><option key={t}>{t}</option>)}</select></td>
          <td><input value={f.label||''} onChange={e=>updFilter(i,'label',e.target.value)} style={{border:'none',fontSize:12,width:80}} placeholder="label"/></td>
          <td><select value={f.operator||''} onChange={e=>updFilter(i,'operator',e.target.value||undefined)} style={{border:'none',fontSize:11}}><option value="">(auto)</option>{operators.map(o=><option key={o}>{o}</option>)}</select></td>
          <td><input value={f.targetField||''} onChange={e=>updFilter(i,'targetField',e.target.value||undefined)} style={{border:'none',fontSize:12,width:75}} placeholder="(inferido)"/></td>
          <td>{f.type==='Enum'&&<input value={(f.enumValues||[]).join(',')} onChange={e=>updFilter(i,'enumValues',e.target.value.split(',').map(s=>s.trim()).filter(Boolean))} style={{fontSize:11,border:'1px solid #e2e8f0',borderRadius:4,padding:'2px 4px',width:90}} placeholder="VAL1,VAL2"/>}</td>
          <td><button className="btn-sm btn-danger" onClick={()=>delFilter(i)}>✕</button></td>
        </tr>))}
        </tbody></table>}
        <button className="btn-sm btn-add" onClick={addFilter} style={{marginTop:10}}>+ Filtro</button>
      </div>

      <div className="card">
        <h3>📤 Export/Import</h3>
        <div className="form-grid">
          <div className="form-group checkbox-group"><input type="checkbox" checked={ei.enabled||false} onChange={e=>setEi('enabled',e.target.checked)} id="ei-en"/><label htmlFor="ei-en">Ativo</label></div>
          <div className="form-group"><label>Formatos</label>
            <div style={{display:'flex',gap:8}}>
              <label style={{fontSize:12,display:'flex',alignItems:'center',gap:4}}><input type="checkbox" checked={(ei.formats||[]).includes('csv')} onChange={e=>{const f=ei.formats||[];setEi('formats',e.target.checked?[...f,'csv']:f.filter(x=>x!=='csv'));}}/> CSV</label>
              <label style={{fontSize:12,display:'flex',alignItems:'center',gap:4}}><input type="checkbox" checked={(ei.formats||[]).includes('excel')} onChange={e=>{const f=ei.formats||[];setEi('formats',e.target.checked?[...f,'excel']:f.filter(x=>x!=='excel'));}}/> Excel</label>
            </div>
          </div>
          <div className="form-group"><label>Campos Export</label><input value={(ei.exportFields||[]).join(', ')} onChange={e=>setEi('exportFields',e.target.value.split(',').map(s=>s.trim()).filter(Boolean))} placeholder="name, price, stock"/></div>
          <div className="form-group"><label>Campos Import</label><input value={(ei.importFields||[]).join(', ')} onChange={e=>setEi('importFields',e.target.value.split(',').map(s=>s.trim()).filter(Boolean))} placeholder="(todos)"/></div>
        </div>
      </div>
    </div>);
  }

  // ════════════════════════════════════════
  // DTO Fields Mini Editor
  // ════════════════════════════════════════
  function DtoFieldsEditor({label,fields,onChange}) {
    const types=['String','Integer','Long','Double','Float','BigDecimal','Boolean','LocalDate','LocalDateTime'];
    const add=()=>onChange([...fields,{name:'',type:'String',required:false}]);
    const upd=(i,k,v)=>{const u=[...fields];u[i]={...u[i],[k]:v};onChange(u);};
    const del=(i)=>onChange(fields.filter((_,idx)=>idx!==i));
    return (<div className="dto-section">
      <h4>{label} ({fields.length} campos)</h4>
      {fields.map((f,i)=>(<div key={i} className="inline-field">
        <input value={f.name||''} onChange={e=>upd(i,'name',e.target.value)} placeholder="campo" style={{width:95}}/>
        <select value={f.type||'String'} onChange={e=>upd(i,'type',e.target.value)}>{types.map(t=><option key={t}>{t}</option>)}</select>
        <label style={{fontSize:11,display:'flex',alignItems:'center',gap:3}}><input type="checkbox" checked={f.required||false} onChange={e=>upd(i,'required',e.target.checked)} style={{width:14,height:14}}/>Req</label>
        <button className="btn-sm btn-danger" onClick={()=>del(i)}>✕</button>
      </div>))}
      <button className="btn-sm btn-add" onClick={add} style={{marginTop:4}}>+ Campo</button>
    </div>);
  }

  // ════════════════════════════════════════
  // Actions Page
  // ════════════════════════════════════════
  function ActionsPage({entity,onChange}) {
    const actions=entity.actions||[];
    const set=(a)=>onChange({...entity,actions:a});
    const add=()=>set([...actions,{name:'',httpMethod:'POST',apiPath:'',requiresId:true,request:[],response:[],roles:[]}]);
    const del=(i)=>set(actions.filter((_,idx)=>idx!==i));
    const upd=(i,k,v)=>{const u=[...actions];u[i]={...u[i],[k]:v};set(u);};
    const methods=['GET','POST','PUT','PATCH','DELETE'];
    return (<div>
      <div className="page-title">🎯 Actions — {entity.name}</div>
      {actions.map((a,i)=>(<div key={i} className="action-card">
        <div className="action-header">
          <div className="action-title">
            {a.httpMethod&&<span className={`method-badge method-${a.httpMethod}`}>{a.httpMethod}</span>}
            {a.name||'(sem nome)'}
            {a.scheduled&&<span style={{fontSize:10,background:'#f3e8ff',color:'#7c3aed',padding:'2px 6px',borderRadius:4}}>⏰ Scheduled</span>}
          </div>
          <button className="btn-sm btn-danger" onClick={()=>del(i)}>Excluir</button>
        </div>
        <div className="form-grid">
          <div className="form-group"><label>Nome</label><input value={a.name||''} onChange={e=>upd(i,'name',e.target.value)} placeholder="activate"/>
            {a.name&&!/^[a-z][a-zA-Z0-9]*$/.test(a.name)&&<span className="warn">⚠ camelCase</span>}</div>
          <div className="form-group"><label>HTTP Method</label><select value={a.httpMethod||''} onChange={e=>upd(i,'httpMethod',e.target.value||null)}><option value="">(nenhum)</option>{methods.map(m=><option key={m}>{m}</option>)}</select></div>
          <div className="form-group"><label>API Path</label><input value={a.apiPath||''} onChange={e=>upd(i,'apiPath',e.target.value)} placeholder="/{id}/activate"/></div>
          <div className="form-group"><label>Descrição</label><input value={a.description||''} onChange={e=>upd(i,'description',e.target.value)}/></div>
          <div className="form-group"><label>Roles</label><input value={(a.roles||[]).join(', ')} onChange={e=>upd(i,'roles',e.target.value.split(',').map(s=>s.trim()).filter(Boolean))} placeholder="ADMIN"/></div>
          <div className="form-group checkbox-group"><input type="checkbox" checked={a.requiresId!==false} onChange={e=>upd(i,'requiresId',e.target.checked)} id={`rid${i}`}/><label htmlFor={`rid${i}`}>Requer ID</label></div>
          <div className="form-group checkbox-group"><input type="checkbox" checked={a.scheduled||false} onChange={e=>upd(i,'scheduled',e.target.checked)} id={`sch${i}`}/><label htmlFor={`sch${i}`}>Scheduled</label></div>
          {a.scheduled&&<div className="form-group"><label>Cron</label><input value={a.scheduledCron||''} onChange={e=>upd(i,'scheduledCron',e.target.value)} placeholder="0 0 3 * * *"/></div>}
        </div>
        <div style={{marginTop:10,padding:10,background:'#f8fafc',borderRadius:8,border:'1px solid #e8edf2'}}>
          <div style={{fontSize:11,fontWeight:600,color:'#64748b',marginBottom:6}}>📡 EVENTO {a.event?.name?`— ${a.event.name}`:'(nenhum)'}</div>
          <div className="form-grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))'}}>
            <div className="form-group"><label>Nome</label><input value={a.event?.name||''} onChange={e=>upd(i,'event',{...(a.event||{}),name:e.target.value||undefined})} placeholder="ProductActivated"/></div>
            <div className="form-group checkbox-group"><input type="checkbox" checked={a.event?.generateListener||false} onChange={e=>upd(i,'event',{...(a.event||{}),generateListener:e.target.checked})} id={`evl${i}`}/><label htmlFor={`evl${i}`}>Listener</label></div>
            <div className="form-group checkbox-group"><input type="checkbox" checked={a.event?.async||false} onChange={e=>upd(i,'event',{...(a.event||{}),async:e.target.checked})} id={`eva${i}`}/><label htmlFor={`eva${i}`}>Async</label></div>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:10}}>
          <DtoFieldsEditor label="➡️ Request DTO" fields={a.request||[]} onChange={f=>upd(i,'request',f)}/>
          <DtoFieldsEditor label="⬅️ Response DTO" fields={a.response||[]} onChange={f=>upd(i,'response',f)}/>
        </div>
      </div>))}
      <button className="btn-sm btn-add" onClick={add} style={{padding:'8px 16px'}}>+ Nova Action</button>
    </div>);
  }

  // ════════════════════════════════════════
  // Queues Page
  // ════════════════════════════════════════
  function QueuesPage({entity,onChange}) {
    const queues=entity.queues||[];
    const set=(q)=>onChange({...entity,queues:q});
    const add=()=>set([...queues,{name:'',exchange:'',routingKey:'',durable:true,direction:'PUBLISH'}]);
    const del=(i)=>set(queues.filter((_,idx)=>idx!==i));
    const upd=(i,k,v)=>{const u=[...queues];u[i]={...u[i],[k]:v};set(u);};
    return (<div>
      <div className="page-title">🐇 Filas RabbitMQ — {entity.name}</div>
      {queues.map((q,i)=>(<div key={i} className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <h3 style={{margin:0}}>🐇 {q.name||'(sem nome)'}</h3>
          <button className="btn-sm btn-danger" onClick={()=>del(i)}>Excluir</button>
        </div>
        <div className="form-grid">
          <div className="form-group"><label>Nome</label><input value={q.name||''} onChange={e=>upd(i,'name',e.target.value)} placeholder="product.stock.updated"/></div>
          <div className="form-group"><label>Exchange</label><input value={q.exchange||''} onChange={e=>upd(i,'exchange',e.target.value)} placeholder="products"/></div>
          <div className="form-group"><label>Routing Key</label><input value={q.routingKey||''} onChange={e=>upd(i,'routingKey',e.target.value)} placeholder="(= nome)"/></div>
          <div className="form-group"><label>Direção</label><select value={q.direction||'PUBLISH'} onChange={e=>upd(i,'direction',e.target.value)}><option value="PUBLISH">Publish</option><option value="CONSUME">Consume</option><option value="BOTH">Both</option></select></div>
          <div className="form-group"><label>DLX</label><input value={q.deadLetterExchange||''} onChange={e=>upd(i,'deadLetterExchange',e.target.value||null)} placeholder="(opcional)"/></div>
          <div className="form-group checkbox-group"><input type="checkbox" checked={q.durable!==false} onChange={e=>upd(i,'durable',e.target.checked)} id={`qd${i}`}/><label htmlFor={`qd${i}`}>Durável</label></div>
        </div>
      </div>))}
      <button className="btn-sm btn-add" onClick={add} style={{padding:'8px 16px'}}>+ Nova Fila</button>
    </div>);
  }

  // ════════════════════════════════════════
  // JSON Editor Page
  // ════════════════════════════════════════
  function JsonPage({forge,setForge}) {
    const [text,setText]=useState(JSON.stringify(forge,null,2));
    const [error,setError]=useState(null);
    useEffect(()=>setText(JSON.stringify(forge,null,2)),[forge]);
    const apply=()=>{try{setForge(JSON.parse(text));setError(null);}catch(e){setError(e.message);}};
    return (<div>
      <div className="page-title">📄 Editor JSON</div>
      <div className="card">
        {error&&<div className="warn" style={{marginBottom:8}}>⚠ {error}</div>}
        <textarea value={text} onChange={e=>setText(e.target.value)} style={{width:'100%',minHeight:520,fontFamily:'JetBrains Mono, monospace',fontSize:12,padding:12,border:'1px solid #e2e8f0',borderRadius:8,resize:'vertical'}}/>
        <button className="btn-sm btn-add" onClick={apply} style={{marginTop:8,padding:'6px 14px'}}>Aplicar JSON</button>
      </div>
    </div>);
  }

  // ════════════════════════════════════════
  // Reverse Engineering Page
  // ════════════════════════════════════════
  function ReversePage({onResult,show}) {
    const [params,setParams]=useState({jdbcUrl:'',jdbcUser:'',jdbcPassword:'',basePackage:'com.myapp',schema:''});
    const [loading,setLoading]=useState(false);
    const set=(k,v)=>setParams({...params,[k]:v});
    const run=async()=>{
      if(!params.jdbcUrl||!params.jdbcUser){show('jdbcUrl e jdbcUser são obrigatórios','error');return;}
      setLoading(true);
      try{const r=await api.reverse(params);if(r.success){onResult(r.forge);show(r.message,'success');}else show(r.error||'Erro','error');}
      catch(e){show('Erro de conexão','error');}
      setLoading(false);
    };
    return (<div>
      <div className="page-title">🔀 Reverse Engineering</div>
      <div className="card">
        <h3>🗄️ Conexão com Banco de Dados</h3>
        <p style={{fontSize:12,color:'#64748b',marginBottom:14}}>Conecte-se a um banco existente para gerar o forge.json automaticamente.</p>
        <div className="form-grid">
          <div className="form-group" style={{gridColumn:'1/-1'}}><label>JDBC URL</label><input value={params.jdbcUrl} onChange={e=>set('jdbcUrl',e.target.value)} placeholder="jdbc:postgresql://localhost:5432/mydb"/></div>
          <div className="form-group"><label>Usuário</label><input value={params.jdbcUser} onChange={e=>set('jdbcUser',e.target.value)} placeholder="postgres"/></div>
          <div className="form-group"><label>Senha</label><input type="password" value={params.jdbcPassword} onChange={e=>set('jdbcPassword',e.target.value)}/></div>
          <div className="form-group"><label>Base Package</label><input value={params.basePackage} onChange={e=>set('basePackage',e.target.value)} placeholder="com.myapp"/></div>
          <div className="form-group"><label>Schema</label><input value={params.schema} onChange={e=>set('schema',e.target.value)} placeholder="(default do driver)"/></div>
        </div>
        <button className="btn-sm btn-add" onClick={run} disabled={loading} style={{marginTop:14,padding:'8px 18px',fontSize:13,opacity:loading?.6:1}}>
          {loading?'⏳ Analisando…':'🔀 Executar Reverse Engineering'}
        </button>
      </div>
      <div className="card">
        <h3>ℹ️ O que detecta automaticamente</h3>
        <ul style={{fontSize:12,color:'#475569',lineHeight:1.8,paddingLeft:20}}>
          <li>Tabelas → entidades (PascalCase)</li>
          <li>Colunas → fields (camelCase) com tipos mapeados</li>
          <li>Foreign keys → relations ManyToOne</li>
          <li><code>created_at</code> / <code>updated_at</code> → auditável</li>
          <li><code>deleted_at</code> → soft delete</li>
          <li>Unique constraints → <code>unique: true</code></li>
        </ul>
      </div>
    </div>);
  }

  // ════════════════════════════════════════
  // Generate Modal
  // ════════════════════════════════════════
  function GenerateModal({entities,onGenerate,onClose}) {
    const [selected,setSelected]=useState(entities.map(e=>e.name));
    const toggle=(name)=>setSelected(s=>s.includes(name)?s.filter(n=>n!==name):[...s,name]);
    const all=selected.length===entities.length;
    const toggleAll=()=>setSelected(all?[]:entities.map(e=>e.name));
    return (<div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>▶ Gerar Código</h3>
        <div style={{fontSize:12,color:'#64748b',marginBottom:10}}>Selecione as entidades para gerar:</div>
        <div className="entity-list">
          <div className="entity-item" style={{borderBottom:'1px solid #e2e8f0',paddingBottom:6,marginBottom:4}}>
            <input type="checkbox" checked={all} onChange={toggleAll}/><label style={{fontSize:12,fontWeight:600,cursor:'pointer'}} onClick={toggleAll}>Todas ({entities.length})</label>
          </div>
          {entities.map(e=>(<div key={e.name} className="entity-item">
            <input type="checkbox" checked={selected.includes(e.name)} onChange={()=>toggle(e.name)} id={`gen-${e.name}`}/>
            <label htmlFor={`gen-${e.name}`} style={{cursor:'pointer'}}>{e.name}</label>
            <span style={{marginLeft:'auto',fontSize:11,color:'#94a3b8'}}>{(e.fields||[]).length} campos</span>
          </div>))}
        </div>
        <div className="modal-actions">
          <button onClick={onClose} style={{background:'#f1f5f9',color:'#475569'}}>Cancelar</button>
          <button onClick={()=>onGenerate(selected)} disabled={!selected.length} style={{background:'#1976d2',color:'#fff',opacity:selected.length?1:.5}}>
            Gerar {selected.length} entidade(s)
          </button>
        </div>
      </div>
    </div>);
  }

  // ════════════════════════════════════════
  // Main App
  // ════════════════════════════════════════
  function App() {
    const [forge,setForge]=useState(null);
    const [page,setPage]=useState('project');
    const [toast,setToast]=useState(null);
    const [showGenModal,setShowGenModal]=useState(false);
    const [previewEntity,setPreviewEntity]=useState(null);
    const [previewOpen,setPreviewOpen]=useState(false);

    const show=(msg,type='success')=>setToast({message:msg,type});

    useEffect(()=>{
      api.getForge().then(setForge).catch(()=>setForge({project:{basePackage:'com.myapp',name:'MyApp',database:'postgres'},entities:[]}));
    },[]);

    if(!forge) return null;

    const save=async()=>{const r=await api.saveForge(forge);show(r.success?'Salvo!':r.error,r.success?'success':'error');};
    const validate=async()=>{const r=await api.validate(forge);show(r.valid?r.message:r.message,r.valid?'success':'error');};
    const openGenerate=()=>setShowGenModal(true);
    const generate=async(selected)=>{
      setShowGenModal(false);show('Gerando...','info');await save();
      const ents=selected.length===forge.entities.length?null:selected;
      const r=await api.generate(ents);
      show(r.success?r.message:r.error,r.success?'success':'error');
    };

    const showPreview=(entityName)=>{setPreviewEntity(entityName);setPreviewOpen(true);};

    const addEntity=()=>{
      const name=prompt('Nome da entidade (PascalCase):');
      if(!name) return;
      setForge({...forge,entities:[...forge.entities,{name,fields:[],relations:[],actions:[],queues:[],auditable:true,softDelete:false}]});
      setPage(`entity:${forge.entities.length}`);
    };

    const delEntity=(idx)=>{
      if(!confirm(`Excluir "${forge.entities[idx].name}"?`)) return;
      setForge({...forge,entities:forge.entities.filter((_,i)=>i!==idx)});
      setPage('project');
    };

    const updEntity=(idx,ent)=>{const u=[...forge.entities];u[idx]=ent;setForge({...forge,entities:u});};

    const entityNames=forge.entities.map(e=>e.name);
    const selectedIdx=page.includes(':')?parseInt(page.split(':')[1]):null;
    const currentEntity=selectedIdx!=null?forge.entities[selectedIdx]:null;

    return (
            <div className="app">
              <div className="sidebar">
                <div className="logo"><h1>⚒️ Spring Forge</h1><span>v1.0</span></div>

                <div className="nav-section">Geral</div>
                <div className={`nav-item ${page==='project'?'active':''}`} onClick={()=>setPage('project')}><span className="icon">⚙️</span>Projeto</div>
                <div className={`nav-item ${page==='diagram'?'active':''}`} onClick={()=>setPage('diagram')}><span className="icon">🗺️</span>Diagrama ER</div>
                <div className={`nav-item ${page==='reverse'?'active':''}`} onClick={()=>setPage('reverse')}><span className="icon">🔀</span>Reverse DB</div>
                <div className={`nav-item ${page==='json'?'active':''}`} onClick={()=>setPage('json')}><span className="icon">📄</span>JSON</div>

                <div className="nav-section">Entidades <span style={{opacity:.5}}>({forge.entities.length})</span></div>
                {forge.entities.map((e,i)=>(<div key={i}>
                  <div className={`nav-item ${page===`entity:${i}`?'active':''}`} onClick={()=>setPage(`entity:${i}`)}>
                    <span className="icon">🏗️</span>{e.name||'…'}<span className="count">{(e.fields||[]).length}</span>
                  </div>
                  {selectedIdx===i&&(<>
                    <div className={`nav-item ${page===`actions:${i}`?'active':''}`} onClick={()=>setPage(`actions:${i}`)} style={{paddingLeft:34,fontSize:12}}>
                      <span className="icon">🎯</span>Actions<span className="count">{(e.actions||[]).length}</span>
                    </div>
                    <div className={`nav-item ${page===`queues:${i}`?'active':''}`} onClick={()=>setPage(`queues:${i}`)} style={{paddingLeft:34,fontSize:12}}>
                      <span className="icon">🐇</span>Filas<span className="count">{(e.queues||[]).length}</span>
                    </div>
                  </>)}
                </div>))}
                <div className="nav-item" onClick={addEntity} style={{color:'#5b8fb9',borderTop:'1px dashed rgba(255,255,255,.1)',marginTop:8,paddingTop:10}}>
                  <span className="icon">➕</span>Nova Entidade
                </div>

                <div className="actions-bar">
                  <button className="btn-gen" onClick={openGenerate}>▶ Gerar Código</button>
                  <button className="btn-sec" onClick={validate}>✓ Validar</button>
                  <button className="btn-sec" onClick={save}>💾 Salvar</button>
                </div>
              </div>

              <div className="main" style={{marginRight:previewOpen?600:0,transition:'margin-right .3s'}}>
                {page==='project'   && <ProjectPage project={forge.project} onChange={p=>setForge({...forge,project:p})}/>}
                {page==='diagram'   && <DiagramPage forge={forge} onChange={setForge} showPreview={showPreview}/>}
                {page==='reverse'   && <ReversePage onResult={f=>{setForge(f);setPage('project');}} show={show}/>}
                {page==='json'      && <JsonPage forge={forge} setForge={setForge}/>}
                {page.startsWith('entity:')  && currentEntity && <EntityPage entity={currentEntity} allNames={entityNames} onChange={e=>updEntity(selectedIdx,e)} showPreview={showPreview}/>}
                {page.startsWith('actions:') && currentEntity && <ActionsPage entity={currentEntity} onChange={e=>updEntity(selectedIdx,e)}/>}
                {page.startsWith('queues:')  && currentEntity && <QueuesPage  entity={currentEntity} onChange={e=>updEntity(selectedIdx,e)}/>}
                {page.startsWith('entity:')  && currentEntity && (
                        <div style={{marginTop:8,display:'flex',gap:8,justifyContent:'flex-end'}}>
                          <button className="btn-sm btn-purple" onClick={()=>showPreview(currentEntity.name)} style={{padding:'6px 14px'}}>🔍 Preview</button>
                          <button className="btn-sm btn-danger"  onClick={()=>delEntity(selectedIdx)} style={{padding:'6px 14px'}}>Excluir Entidade</button>
                        </div>
                )}
              </div>

              <PreviewDrawer open={previewOpen} entityName={previewEntity} onClose={()=>setPreviewOpen(false)}/>

              {toast && <Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)}/>}
              {showGenModal && <GenerateModal entities={forge.entities} onGenerate={generate} onClose={()=>setShowGenModal(false)}/>}
            </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
